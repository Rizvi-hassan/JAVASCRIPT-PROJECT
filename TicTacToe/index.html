<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Tic-Tac-Toe</h1>
    <div class="grid">
        <div class="cells" id="00"></div>
        <div class="cells" id="01"></div>
        <div class="cells" id="02"></div>
        <div class="cells" id="10"></div>
        <div class="cells" id="11"></div>
        <div class="cells" id="12"></div>
        <div class="cells" id="20"></div>
        <div class="cells" id="21"></div>
        <div class="cells" id="22"></div>
    </div>

    <button id="reset">Reset</button>
    <p id="msg">0 won!!</p>
</body>
<script src="script.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</html>
