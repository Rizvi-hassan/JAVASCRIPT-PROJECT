<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" >
        <form action="#" id="search-form">
            <input type="text" placeholder="Search for News" name="search-input">
            <span><i class="fa-solid fa-magnifying-glass"></i></span>
        </form>
        
        <h1>Top stories for you</h1>
        <ul class="tags">
            <li id="all" class="active">All</li>
            <li id="business">Business</li>
            <li id="politics">Politics</li>
            <li id="sport">Sports</li>
            <li id="entertainment">Entertainment</li>
        </ul>

        <div class="grid">
        </div>
    </div>
</body>
<script src="script.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</html>
