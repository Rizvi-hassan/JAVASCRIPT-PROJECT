<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticky Notes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Sticky Notes</h1>
        <div class="notesGrid">
            <div class="note" id="newNote">
                <textarea placeholder="Type a new note..." id="note-content" ></textarea>
                <button type="button" id="new-note-btn">+</button>
            </div>
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
